                                                </div>
                                            </div>
                                            );
                                        })() : (
                                            <div className="p-8 text-center text-on-surface-variant italic text-sm mt-10">Keine Daten verfügbar.</div>
                                        )}
                                    </div>
                                </div>
                            )}

                            {/* TAB 2: ASSIGNMENT */}
                            {activeTab === 'assignments' && (
                                <div className="flex h-full tab-transition">
                                    <div className="w-[320px] border-r border-surface-container-high/50 flex flex-col bg-surface shrink-0">
                                        <div className="p-6 pb-4">
                                            <h2 className="font-manrope font-bold text-2xl text-on-surface">Personal</h2>
                                            <p className="text-xs text-on-surface-variant mt-1 font-medium">{filteredMembers.length} Teammitglieder gefunden</p>
                                        </div>
                                        <div className="flex-1 overflow-y-auto px-5 pb-6 space-y-3">
                                            {filteredMembers.map(m => (
                                                <div 
                                                    key={m.id} 
                                                    onClick={()=>setSelectedAssignee(m.id)} 
                                                    className={`p-4 rounded-2xl cursor-pointer transition-all flex items-center justify-between group border ${selectedAssignee === m.id ? 'bg-surface-container-lowest shadow-ambient border-primary/50' : 'bg-surface-container-lowest border-transparent hover:border-surface-container-high hover:shadow-sm'}`}
                                                >
                                                    <div className="flex items-center gap-4">
                                                        <div className="w-11 h-11 rounded-full flex items-center justify-center text-white font-bold text-sm shadow-sm" style={{backgroundColor: m.color}}>{m.short}</div>
                                                        <div>
                                                            <h4 className={`font-bold text-sm ${selectedAssignee === m.id ? 'text-on-surface' : 'text-on-surface-variant group-hover:text-on-surface'}`}>{m.name}</h4>
                                                            <p className="text-[11px] text-on-surface-variant font-medium mt-0.5">{m.title || 'Mitarbeiter'}</p>
                                                        </div>
                                                    </div>
                                                    {selectedAssignee === m.id && <div className="w-5 h-5 rounded-full bg-primary flex items-center justify-center"><Icons.Check className="w-3 h-3 text-white"/></div>}
                                                </div>
                                            ))}
                                            {filteredMembers.length === 0 && <p className="text-sm text-on-surface-variant italic px-2">Keine Mitarbeiter gefunden.</p>}
                                        </div>
                                        <div className="p-6 border-t border-surface-container-high/50">
                                            <button onClick={()=>setShowTeamManager(true)} className="w-full bg-surface-container-lowest border border-surface-container-high text-on-surface font-bold text-sm py-2.5 rounded-xl hover:text-primary hover:border-primary/30 transition-colors shadow-sm">
                                                Team verwalten
                                            </button>
                                        </div>
                                    </div>
                                    
                                    <div className="flex-1 bg-surface-container-lowest flex flex-col relative overflow-hidden">
                                        {selectedAssignee ? (() => {
                                            const member = currentDept.members.find(m => m.id === selectedAssignee);
                                            const assignedCount = (currentDept.memberTasks[selectedAssignee] || []).length;
                                            return (
                                                <div className="flex flex-col h-full">
                                                    <div className="p-8 md:p-12 border-b border-surface-container-high/30 flex justify-between items-end">
                                                        <div>
                                                            <p className="text-[10px] font-bold uppercase tracking-widest text-primary mb-2">AUFGABEN-ZUWEISUNG</p>
                                                            <h2 className="text-3xl font-manrope font-extrabold text-on-surface">Aktive Matrix: {member.name}</h2>
                                                        </div>
                                                    </div>
                                                    
                                                    <div className="flex-1 overflow-y-auto p-8 md:p-12 bg-surface">
                                                        {Object.entries(tasksByCategory).map(([cat, tasks], catIndex) => (
                                                            <div key={cat} className="mb-12">
                                                                <div className="flex justify-between items-center mb-6">
                                                                    <h3 className="font-manrope font-bold text-xl text-on-surface">{cat}</h3>
                                                                    <span className="text-[10px] font-bold text-primary bg-primary-fixed px-2 py-1 rounded uppercase tracking-widest">{tasks.length} AUFGABEN</span>
                                                                </div>
                                                                <div className="grid grid-cols-1 md:grid-cols-2 2xl:grid-cols-3 gap-6">
                                                                    
                                                                    {catIndex === 0 && (
                                                                        <div className="p-8 rounded-2xl bg-on-surface text-white shadow-ambient flex flex-col justify-center relative overflow-hidden">
                                                                            <p className="text-[10px] font-bold text-white/60 uppercase tracking-widest mb-1">MEMBER SNAPSHOT</p>
                                                                            <h4 className="font-manrope font-bold text-xl mb-6">{member.name.split(' ')[0]}'s Kapazität</h4>
                                                                            <div className="flex items-end gap-2 mb-2">
                                                                                <span className="text-5xl font-extrabold">{Math.min(100, Math.round((assignedCount / 5) * 100))}%</span>
                                                                                <span className="text-white/60 text-xs mb-1 font-medium">Auslastung</span>
                                                                            </div>
                                                                            <div className="h-1.5 w-full bg-white/20 rounded-full overflow-hidden mt-1">
                                                                                <div className="h-full bg-primary transition-all duration-500" style={{width: `${Math.min(100, Math.round((assignedCount / 5) * 100))}%`}}></div>
                                                                            </div>
                                                                        </div>
                                                                    )}

                                                                    {tasks.map(t => {
                                                                        const isAssigned = (currentDept.memberTasks[selectedAssignee] || []).includes(t.id);
                                                                        const IconCmp = getTaskIcon(t.category);
                                                                        return (
                                                                            <div key={t.id} onClick={()=>handleToggleMemberTask(selectedAssignee, t.id)} className={`relative p-6 rounded-2xl cursor-pointer transition-all border group ${isAssigned ? 'bg-surface-container-lowest border-primary/30 shadow-ambient' : 'bg-surface-container-lowest border-surface-container-high hover:border-surface-container-high/80 hover:shadow-sm'}`}>
                                                                                <div className="flex justify-between items-start mb-4">
                                                                                    <div className={`text-xl ${isAssigned ? 'text-primary' : 'text-on-surface-variant group-hover:text-on-surface'}`}>
                                                                                        {IconCmp}
                                                                                    </div>
                                                                                    <div onClick={e => e.stopPropagation()}>
                                                                                        <CustomCheckbox checked={isAssigned} onChange={() => handleToggleMemberTask(selectedAssignee, t.id)} color={member.color} />
                                                                                    </div>
                                                                                </div>
                                                                                <h4 className={`font-bold text-base mb-2 pr-8 ${isAssigned ? 'text-on-surface' : 'text-on-surface-variant group-hover:text-on-surface'}`}>{t.name}</h4>
                                                                                <p className="text-xs text-on-surface-variant leading-relaxed line-clamp-3 mb-6 min-h-[3rem]">{t.desc || 'Keine detaillierte Beschreibung hinterlegt.'}</p>
                                                                            </div>
                                                                        )
                                                                    })}
                                                                </div>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            )
                                        })() : (
                                            <div className="flex h-full items-center justify-center text-on-surface-variant flex-col p-12 text-center">
                                                <Icons.Users className="w-12 h-12 mb-4 opacity-50"/>
                                                <h3 className="font-manrope font-bold text-xl mb-2">Personal auswählen</h3>
                                                <p className="text-sm">Bitte wählen Sie links ein Team-Mitglied aus.</p>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )}

                            {/* TAB 3: MATRIX */}
                            {activeTab === 'matrix' && (
                                <div className="p-8 md:p-12 w-full tab-transition">
                                    <div className="flex flex-col lg:flex-row justify-between items-start lg:items-end mb-10 gap-6">
                                        <div>
                                            <p className="text-[10px] font-bold text-primary uppercase tracking-widest mb-2">LEISTUNGSDATEN</p>
                                            <div className="flex items-center gap-6 mb-3">
                                                <h2 className="font-manrope font-extrabold text-3xl md:text-4xl text-on-surface">Globale Skill-Matrix</h2>
                                                <div className="flex bg-surface-container-high/50 p-1 rounded-lg">
                                                    <button
                                                        onClick={() => setMatrixViewMode('categories')}
                                                        className={`px-4 py-1.5 text-xs font-bold rounded-md transition-colors ${matrixViewMode === 'categories' ? 'bg-white text-primary shadow-sm' : 'text-on-surface-variant hover:text-on-surface'}`}
                                                    >
                                                        Nach Kategorien
                                                    </button>
                                                    <button
                                                        onClick={() => setMatrixViewMode('tasks')}
                                                        className={`px-4 py-1.5 text-xs font-bold rounded-md transition-colors ${matrixViewMode === 'tasks' ? 'bg-white text-primary shadow-sm' : 'text-on-surface-variant hover:text-on-surface'}`}
                                                    >
                                                        Nach Aufgaben
                                                    </button>
                                                </div>
                                            </div>
                                            <p className="text-on-surface-variant text-sm max-w-2xl">Abbildung des menschlichen Potenzials über fachliche und technische Domänen hinweg. Daten aktualisiert: {lastImportTime.toLocaleString('de-CH', {dateStyle:'medium', timeStyle:'short'})}.</p>
                                        </div>
                                    </div>

                                    <div className="bg-surface-container-lowest rounded-2xl shadow-ambient overflow-hidden mb-12 border border-surface-container-high/50">
                                        <div className="overflow-x-auto pb-10">
                                            <table className="w-full text-left border-collapse min-w-[800px]">
                                                <thead>
                                                    <tr>
                                                        <th className="px-8 py-6 w-[350px] border-b border-surface-container-high/50">
                                                            <div className="flex items-center justify-between">
                                                                <div className="flex items-center gap-2 text-[10px] font-bold text-primary uppercase tracking-widest">
                                                                    {matrixViewMode === 'categories' ? 'Skill Kategorien' : 'Aufgaben & Benötigte Skills'}
                                                                </div>
                                                                {matrixViewMode === 'categories' && (
                                                                    <button onClick={handleAddCategory} className="text-primary hover:bg-primary-fixed p-1.5 rounded transition-colors flex items-center gap-1 text-[10px] font-bold uppercase tracking-widest" title="Neue Kategorie hinzufügen">
                                                                        <Icons.Plus className="w-3.5 h-3.5"/>
                                                                    </button>
                                                                )}
                                                            </div>
                                                        </th>
                                                        {currentDept.members.map(m => (
                                                            <th key={m.id} className="px-2 py-6 text-center border-b border-surface-container-high/50 min-w-[100px]">
                                                                <div className="flex flex-col items-center gap-3">
                                                                    <div className="w-10 h-10 rounded-full flex items-center justify-center text-white font-bold text-sm shadow-md" style={{backgroundColor: m.color}}>{m.short}</div>
                                                                    <span className="text-xs font-semibold text-on-surface truncate w-full px-2" title={m.name}>{m.name}</span>
                                                                </div>
                                                            </th>
                                                        ))}
                                                    </tr>
                                                </thead>
                                                {matrixViewMode === 'categories' && Object.entries(currentDept.skills).map(([cat, skills], catIndex) => {
                                                    const catSkillsFilter = skills.filter(s => s.name.toLowerCase().includes(searchQuery.toLowerCase()));
                                                    if (catSkillsFilter.length === 0 && searchQuery !== '') return null;
                                                    
                                                    return (
                                                    <tbody 
                                                        key={cat}
                                                        onDragOver={(e) => { 
                                                            e.preventDefault(); 
                                                            if (draggedSkill && draggedSkill.category !== cat) setDragOverCat(cat); 
                                                        }}
                                                        onDragLeave={(e) => { 
                                                            e.preventDefault(); 
                                                            setDragOverCat(null); 
                                                        }}
                                                        onDrop={(e) => {
                                                            e.preventDefault();
                                                            setDragOverCat(null);
                                                            if (!draggedSkill) return;
                                                            if (draggedSkill.category === cat) return;

                                                            const sourceCatName = draggedSkill.category;
                                                            const targetCatName = cat;
                                                            
                                                            const sourceSkills = [...currentDept.skills[sourceCatName]];
                                                            const targetSkills = [...currentDept.skills[targetCatName]];
                                                            
                                                            const skillIndex = sourceSkills.findIndex(s => s.id === draggedSkill.id);
                                                            if (skillIndex > -1) {
                                                                const [movedSkill] = sourceSkills.splice(skillIndex, 1);
                                                                targetSkills.push(movedSkill);
                                                                
                                                                updateCurrentDept({ 
                                                                    skills: {
                                                                        ...currentDept.skills,
                                                                        [sourceCatName]: sourceSkills,
                                                                        [targetCatName]: targetSkills
                                                                    }
                                                                });
                                                            }
                                                        }}
                                                        className={`transition-colors ${dragOverCat === cat ? 'bg-primary-fixed/30 shadow-[inset_0_0_0_2px_#D30018]' : ''}`}
                                                    >
                                                        <tr>
                                                            <td colSpan={currentDept.members.length + 1} className="px-8 py-4 bg-surface-container-lowest border-y border-surface-container-high/50 cursor-pointer group/cat hover:bg-surface-container-low transition-colors" onClick={() => setExpandedCats(prev => ({...prev, [cat]: !prev[cat]}))}>

                                                                    <div className="flex items-center gap-3 text-xs font-bold text-on-surface uppercase tracking-widest">

                                                                            <input autoFocus className="bg-white px-2 py-1 outline-none border border-primary rounded text-on-surface" value={editCatNameVal} onChange={e=>setEditCatNameVal(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')handleRenameCategory(cat, editCatNameVal); if(e.key==='Escape')setEditingCatName(null);}} onBlur={()=>handleRenameCategory(cat, editCatNameVal)} onClick={e=>e.stopPropagation()} />
                                                                        ) : (
                                                                            <span>{cat}</span>
                                                                        )}
                                                                    </div>
                                                                    <div className="flex items-center opacity-0 group-hover/cat:opacity-100 transition-opacity">
                                                                        <button onClick={(e)=>{e.stopPropagation(); setEditingCatName(cat); setEditCatNameVal(cat);}} className="text-on-surface-variant hover:text-primary p-1 mx-1" title="Kategorie umbenennen"><Icons.Edit2 className="w-3.5 h-3.5"/></button>
                                                                        <button onClick={(e)=>{e.stopPropagation(); handleDeleteCategory(cat);}} className="text-on-surface-variant hover:text-primary p-1 mx-1 mr-4" title="Kategorie löschen"><Icons.Trash2 className="w-3.5 h-3.5"/></button>
                                                                        <button onClick={(e)=>{e.stopPropagation(); handleAddSkill(cat); setExpandedCats(p=>({...p, [cat]:true}));}} className="text-xs font-bold text-primary flex items-center gap-1 bg-primary/10 px-3 py-1.5 rounded hover:bg-primary hover:text-white transition-colors">
                                                                            <Icons.Plus className="w-3.5 h-3.5"/> Neuer Skill
                                                                        </button>
                                                                    </div>
                                                                </div>
                                                            </td>
                                                        </tr>
                                                        {expandedCats[cat] && catSkillsFilter.map((skill, sIndex) => (
                                                            <tr 
                                                                key={skill.id} 
                                                                draggable
                                                                onDragStart={(e) => {
                                                                    setDraggedSkill({ id: skill.id, category: cat });
                                                                    e.dataTransfer.effectAllowed = 'move';
                                                                }}
                                                                onDragEnd={() => {
                                                                    setDraggedSkill(null);
                                                                    setDragOverCat(null);
                                                                }}
                                                                className={`group hover:bg-surface-container-low/30 transition-colors ${draggedSkill?.id === skill.id ? 'opacity-40' : ''}`}
                                                            >
                                                                <td className={`px-8 py-4 text-sm font-medium text-on-surface-variant group-hover:text-on-surface transition-colors border-r border-surface-container-high/30 ${sIndex !== catSkillsFilter.length-1 ? 'border-b border-surface-container-high/30' : ''}`}>

                                                                        <div className="flex items-center gap-3 flex-1 min-w-0 pr-4">
                                                                            <div className="cursor-grab active:cursor-grabbing text-surface-container-high group-hover/skillrow:text-on-surface-variant/50 hover:!text-on-surface-variant transition-colors shrink-0" title="Skill verschieben">
                                                                                <Icons.GripVertical className="w-4 h-4" />
                                                                            </div>
                                                                            {editingSkillId === skill.id ? (
                                                                                <input autoFocus className="bg-transparent border-b border-primary w-full outline-none text-on-surface font-bold" value={editNameVal} onChange={e=>setEditNameVal(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')handleRenameSkill(cat, skill.id, editNameVal); if(e.key==='Escape')setEditingSkillId(null);}} onBlur={()=>handleRenameSkill(cat, skill.id, editNameVal)} />
                                                                            ) : (
                                                                                <span className="text-on-surface truncate">{skill.name}</span>
                                                                            )}
                                                                        </div>
                                                                        <div className="opacity-0 group-hover:opacity-100 flex gap-2 transition-opacity shrink-0">
                                                                            <button onClick={()=>{setEditingSkillId(skill.id);setEditNameVal(skill.name)}} className="text-on-surface-variant hover:text-primary"><Icons.Edit2 className="w-3.5 h-3.5"/></button>
                                                                            <button onClick={()=>handleDeleteSkill(cat, skill.id)} className="text-on-surface-variant hover:text-primary"><Icons.Trash2 className="w-3.5 h-3.5"/></button>
                                                                        </div>
                                                                    </div>
                                                                </td>
                                                                {currentDept.members.map(m => {
                                                                    const { score, isDerived, derivedScore } = getEffectiveScore(currentDept, m.id, skill.id, skill.scores);
                                                                    return (
                                                                        <td key={m.id} className={`px-2 py-4 text-center ${sIndex !== catSkillsFilter.length-1 ? 'border-b border-surface-container-high/30' : ''}`}>
                                                                            <MatrixDot level={score} isDerived={isDerived} derivedScore={derivedScore} isEditable={true} onClick={()=>handleScoreClick(cat, skill.id, m.id, score, derivedScore)} />
                                                                        </td>
                                                                    )
                                                                })}
                                                            </tr>
                                                        ))}
                                                    </tbody>
                                                    )
                                                })}
                                                {matrixViewMode === 'tasks' && currentDept.tasks.map(task => {
                                                    if (searchQuery && !task.name.toLowerCase().includes(searchQuery.toLowerCase()) && !task.category.toLowerCase().includes(searchQuery.toLowerCase())) return null;
                                                    const isExpanded = expandedMatrixTasks[task.id];
                                                    
                                                    return (
                                                        <tbody key={task.id}>
                                                            <tr className="bg-surface-container-lowest border-y border-surface-container-high/50 cursor-pointer hover:bg-surface-container-low transition-colors group/taskrow" onClick={() => setExpandedMatrixTasks(p => ({...p, [task.id]: !p[task.id]}))}>
                                                                <td className="px-8 py-4">
                                                                    <div className="flex justify-between items-center">
                                                                        <div className="flex items-center gap-3 text-sm font-bold text-on-surface">
                                                                            {isExpanded ? <Icons.ChevronDown className="w-4 h-4 text-primary"/> : <Icons.ChevronRight className="w-4 h-4 text-on-surface-variant"/>}
                                                                            <span>{task.name}</span>
                                                                            <span className="text-[9px] font-bold px-2 py-0.5 rounded bg-surface-container-high text-on-surface-variant uppercase tracking-widest">{task.category}</span>
                                                                        </div>
                                                                        <div className="text-[10px] font-bold text-on-surface-variant bg-surface-container-low px-2 py-1 rounded opacity-0 group-hover/taskrow:opacity-100 transition-opacity">
                                                                            {task.requiredSkills.length} SKILLS
                                                                        </div>
                                                                    </div>
                                                                </td>
                                                                {currentDept.members.map(m => {
                                                                    const isAssigned = (currentDept.memberTasks[m.id] || []).includes(task.id);
                                                                    return (
                                                                        <td key={m.id} className="px-2 py-4 text-center border-l border-surface-container-high/30" onClick={(e) => { e.stopPropagation(); handleToggleMemberTask(m.id, task.id); }}>
                                                                            <div className="flex justify-center">
                                                                                <CustomCheckbox checked={isAssigned} onChange={() => handleToggleMemberTask(m.id, task.id)} color={m.color} />
                                                                            </div>
                                                                        </td>
                                                                    )
                                                                })}
                                                            </tr>
                                                            {isExpanded && task.requiredSkills.map((sId, sIndex) => {
                                                                const skill = allSkillsFlat.find(s => s.id === sId);
                                                                if (!skill) return null;
                                                                let catName = "";
                                                                for (const [c, skills] of Object.entries(currentDept.skills)) {
                                                                    if (skills.some(s => s.id === skill.id)) { catName = c; break; }
                                                                }
                                                                return (
                                                                    <tr key={skill.id} className="group hover:bg-surface-container-low/30 transition-colors bg-surface/30">
                                                                        <td className={`px-8 py-3 text-sm font-medium text-on-surface-variant group-hover:text-on-surface transition-colors border-r border-surface-container-high/30 ${sIndex !== task.requiredSkills.length-1 ? 'border-b border-surface-container-high/30' : ''}`}>
                                                                            <div className="pl-8 flex justify-between items-center">
                                                                                <div className="flex items-center gap-3 flex-1 min-w-0 pr-4">
                                                                                    <span className="text-on-surface truncate">{skill.name}</span>
                                                                                    <span className="text-[9px] font-bold text-on-surface-variant/50 uppercase tracking-widest border border-surface-container-high/60 bg-white px-1.5 py-0.5 rounded">{catName}</span>
                                                                                </div>
                                                                            </div>
                                                                        </td>
                                                                        {currentDept.members.map(m => {
                                                                            const { score, isDerived, derivedScore } = getEffectiveScore(currentDept, m.id, skill.id, skill.scores);
                                                                            return (
                                                                                <td key={m.id} className={`px-2 py-3 text-center border-l border-surface-container-high/30 ${sIndex !== task.requiredSkills.length-1 ? 'border-b border-surface-container-high/30' : ''}`}>
                                                                                    <MatrixDot level={score} isDerived={isDerived} derivedScore={derivedScore} isEditable={true} onClick={()=>handleScoreClick(catName, skill.id, m.id, score, derivedScore)} />
                                                                                </td>
                                                                            )
                                                                        })}
                                                                    </tr>
                                                                )
                                                            })}
                                                            {isExpanded && task.requiredSkills.length === 0 && (
                                                                <tr>
                                                                    <td className="px-8 py-4 text-xs italic text-on-surface-variant bg-surface/30 border-r border-surface-container-high/30">Keine Skills für diese Aufgabe konfiguriert.</td>
                                                                    <td colSpan={currentDept.members.length} className="bg-surface/30 border-l border-surface-container-high/30"></td>
                                                                </tr>
                                                            )}
                                                        </tbody>
                                                    );
                                                })}
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'job' && (
                                <div className="flex h-full no-print tab-transition">

                                            <h2 className="font-manrope font-bold text-2xl text-on-surface mb-2">Profil konfigurieren</h2>

                                        <div className="flex-1 overflow-y-auto px-8 pb-8">
                                            <div className="space-y-6">
                                                <div>
                                                    <label className="block text-[10px] font-bold text-primary uppercase tracking-widest mb-2">PUBLICATION TITLE</label>

                                                </div>
                                                
                                                <div className="pt-4 border-t border-surface-container-high/50">
                                                    <div className="flex justify-between items-center mb-4">
                                                        <h3 className="font-bold text-sm text-on-surface">Aufgaben-Katalog</h3>
                                                        <span className="text-[10px] font-bold bg-primary-fixed text-primary px-2 py-0.5 rounded">{currentDept.tasks.length} Verfügbar</span>
                                                    </div>
                                                    <div className="space-y-3">
                                                        {currentDept.tasks.map(t => {
                                                            const isTarget = (currentDept.targetTasks||[]).includes(t.id);
                                                            return (
                                                                <div key={t.id} onClick={()=>handleToggleTargetTask(t.id)} className={`p-4 rounded-xl cursor-pointer transition-all flex gap-4 ${isTarget ? 'bg-primary-fixed shadow-ambient border-l-4 border-primary' : 'bg-surface-container-lowest border border-surface-container-high/30 hover:border-surface-container-high/80'}`}>
                                                                    <div className="pt-0.5">
                                                                        <CustomCheckbox checked={isTarget} onChange={() => {}} />
                                                                    </div>
                                                                    <div>
                                                                        <h4 className={`font-semibold text-sm mb-1 ${isTarget ? 'text-on-surface' : 'text-on-surface-variant'}`}>{t.name}</h4>
                                                                        <div className="flex gap-2">
                                                                            <span className={`text-[9px] font-bold px-1.5 py-0.5 rounded ${isTarget ? 'bg-white text-on-surface-variant' : 'bg-surface text-on-surface-variant'}`}>{t.category}</span>
                                                                        </div>
                                                                    </div>
                                                                </div>
                                                            )
                                                        })}
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div className="flex-1 bg-surface-container-high/30 flex flex-col items-center justify-start p-8 overflow-y-auto relative">
                                        <div 
                                            id="printable-job-profile" 
                                            className="bg-white w-[794px] min-h-[1123px] shadow-2xl p-16 relative flex flex-col transition-transform duration-200"

                                            <div className="flex justify-between items-start mb-12">
                                                <div>
                                                    <div className="bg-primary text-white font-manrope font-bold text-lg px-4 py-1.5 inline-block mb-6 tracking-wider">{currentDept.name}</div>
                                                    <input className="text-7xl font-manrope font-extrabold text-on-surface w-[500px] leading-tight editable-field" value={currentDept.jobProfile.title || 'Job Titel'} onChange={e=>updateJobProfile('title', e.target.value)} />
                                                </div>
                                            </div>

                                                <div className="flex-1 space-y-12 pr-4">
                                                    <div>
                                                        <h3 className="font-manrope font-bold text-2xl text-primary mb-4"><input className="editable-field w-full text-primary" value={currentDept.jobProfile.introTitle || 'Das ist dein Job'} onChange={e=>updateJobProfile('introTitle', e.target.value)} /></h3>

                                                </div>
                                                
                                                <div className="w-[300px] bg-[#FDF8F8] border border-primary-fixed p-8 rounded-2xl h-fit">
                                                    <h3 className="text-xs font-bold text-primary uppercase tracking-widest mb-8 border-b border-primary-fixed pb-3">EXPECTED SKILLS</h3>

                                                                        {coreSkills.map(s => (
                                                                            <div key={s.id}>
                                                                                <div className="flex justify-between items-center mb-1.5 text-xs font-semibold text-on-surface">
                                                                                    <span className="truncate pr-2">{s.name}</span>
                                                                                </div>

                                                                                </div>
                                                                            </div>
                                                                        ))}
                                                                    </div>
                                                                </div>
                                                            )}

                                                                <div>
                                                                    <p className="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest mb-3">DIGITAL TOOLS</p>

                                                                            <span key={s.id} className="text-[10px] font-semibold border border-primary/20 bg-white text-on-surface px-2.5 py-1 rounded">
                                                                                {s.name}
                                                                            </span>
                                                                        ))}
                                                                    </div>
                                                                </div>
                                                            )}
                                                            {softSkills.length > 0 && (
                                                                <div>

                                                                        {softSkills.map(s => s.name).join(', ')}

                                                                </div>

                                                        <p className="text-xs text-on-surface-variant italic">Bitte wählen Sie Aufgaben im Katalog, um benötigte Skills zu generieren.</p>

                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                                </div>

                                                    {currentDept.members.map(m => (
                                                        <div key={m.id} onClick={()=>setVisibleMembers(p=>({...p, [m.id]:!p[m.id]}))} className="flex items-center justify-between p-2 rounded-lg hover:bg-surface-container-low cursor-pointer transition-colors group">
                                                            <span className="font-semibold text-sm text-on-surface flex items-center gap-3"><div className="w-3 h-3 rounded-full" style={{backgroundColor: m.color}}></div> {m.name}</span>
                                                            <CustomCheckbox checked={visibleMembers[m.id]} onChange={() => setVisibleMembers(p=>({...p, [m.id]:!p[m.id]}))} color={m.color} />
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>

                                        <div className="lg:col-span-9 bg-surface-container-lowest rounded-2xl shadow-ambient p-8 md:p-12 flex flex-col border border-surface-container-high/50">
                                            <div className="flex-1 min-h-[400px] relative">
                                                <ResponsiveContainer width="100%" height="100%">
                                                    <RadarChart cx="50%" cy="50%" outerRadius="75%" data={radarData}>
                                                        <PolarGrid stroke="#E2E4E9" />
                                                        <PolarAngleAxis dataKey="subject" tick={{fontSize:11, fill:'#6B7280', fontFamily: 'Inter', fontWeight: 700, letterSpacing: '0.05em'}} />
                                                        <PolarRadiusAxis angle={30} domain={[0, 3]} tickCount={4} stroke="#E2E4E9" />
                                                        {currentDept.members.map(m => visibleMembers[m.id] && <Radar key={m.id} name={m.name} dataKey={m.id} stroke={m.color} fill="none" strokeWidth={2} strokeDasharray="5 5" />)}
                                                        {visibleMembers.target && <Radar name="Target Profile (Team Goal)" dataKey="target" stroke={BRAND_COLOR} strokeWidth={3} fill={BRAND_COLOR} fillOpacity={0.05} />}
                                                        <Legend wrapperStyle={{paddingTop:'40px', fontWeight: 600, fontSize: '12px', fontFamily: 'Inter', color: '#6B7280'}}/>
                                                        <RechartsTooltip contentStyle={{borderRadius:'12px', border:'none', boxShadow:'0 8px 30px -4px rgba(0, 0, 0, 0.08)'}}/>
                                                    </RadarChart>
                                                </ResponsiveContainer>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                        </main>
                    </div>

                    {showTeamManager && <TeamManager members={currentDept.members} onUpdate={handleUpdateTeam} onClose={()=>setShowTeamManager(false)} />}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<KineticMatrixApp />);
    </script>
</body>
</html>
